services:
  postgres:
    image: postgres:16
    container_name: pdi_postgres
    environment:
      POSTGRES_DB: pdi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - pdi_postgres_data:/var/lib/postgresql/data

volumes:
  pdi_postgres_data: